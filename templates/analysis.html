<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>📊 Weather Data Analysis</h1>

        <h2>Stored Weather Records</h2>
        <table>
            <tr>
                <th>City</th><th>Temp (°C)</th><th>Humidity (%)</th><th>Wind</th><th>Date</th>
            </tr>
            {% for row in data %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
                <td>{{ row[4] }}</td>
            </tr>
            {% endfor %}
        </table>

        <h2>Prediction</h2>
        <p>{{ prediction }}</p>

        <a href="/">🔙 Back to Search</a>
    </div>
</body>
</html>
