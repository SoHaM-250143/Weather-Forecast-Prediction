<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌦 Weather Forecast & Prediction</title>
<style>
  /* Body Background */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* Container  Card */
  .container {
    background: rgba(255,255,255,0.95);
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    width: 400px;
    text-align: center;
    animation: fadeIn 1s ease-in-out;
  }

  h2 {
    margin-bottom: 20px;
    color: #333;
    letter-spacing: 1px;
  }

  /* Input Field */
  input {
    padding: 12px 15px;
    width: 70%;
    border: 2px solid #4CAF50;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    margin-bottom: 15px;
    transition: 0.3s;
  }
  input:focus {
    border-color: #2196F3;
    box-shadow: 0 0 8px #2196F3;
  }

  /* Buttonns */
  button {
    padding: 12px 20px;
    margin: 5px 0;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    font-size: 16px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }
  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  .btn-primary {
    background: #4CAF50;
  }
  .btn-primary:hover {
    background: #45a049;
  }

  .btn-analysis {
    background: #2196F3;
  }
  .btn-analysis:hover {
    background: #1976D2;
  }

  /* Result Cards */
  #result, #predictionResult {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
    background: #f9f9f9;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
    animation: slideUp 0.5s ease forwards;
  }

  #result h3 {
    margin-bottom: 10px;
    color: #2196F3;
  }

  #predictionResult p {
    font-size: 18px;
    color: #FF5722;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px);}
    to { opacity: 1; transform: translateY(0);}
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
  }
</style>
</head>
<body>
<div class="container">
  <h2>🌦 Weather Forecast & Prediction</h2>
  <input type="text" id="city" placeholder="Enter City Name">
  <br>
  <button class="btn-primary" onclick="getWeather()">☀️ Get Weather</button>
  <button class="btn-analysis" onclick="window.location.href='/analysis'">📊 View Analysis</button>
  <button class="btn-analysis" onclick="getPrediction()">🔮 Predict Next Temperature</button>

  <!-- Result Cards -->
  <div id="result"></div>
  <div id="predictionResult"></div>
</div>

<script>
async function getWeather() {
  const city = document.getElementById("city").value.trim();
  if (!city) {
    alert("Please enter a city name!");
    return;
  }

  try {
    const response = await fetch(`/get_weather?city=${city}`);
    const data = await response.json();

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";

    if (data.error) {
      resultDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;
    } else {
      resultDiv.innerHTML = `
        <h3>${data.city}</h3>
        <p>🌡 Temperature: ${data.temperature} °C</p>
        <p>💧 Humidity: ${data.humidity}%</p>
        <p>🌬 Wind Speed: ${data.wind} m/s</p>
      `;
    }
  } catch (err) {
    alert("Failed to fetch weather. Check server.");
  }
}

async function getPrediction() {
  const city = document.getElementById("city").value.trim();
  if (!city) {
    alert("Please enter a city name first!");
    return;
  }

  try {
    const response = await fetch(`/predict?city=${city}`);
    const data = await response.json();

    const predDiv = document.getElementById("predictionResult");
    predDiv.style.display = "block";

    if (data.error) {
      predDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;
    } else {
      predDiv.innerHTML = `
        <p>🔮 Predicted Next Temperature for <b>${data.city}</b>: ${data.predicted_temperature} °C</p>
        <small>(Based on ${data.data_points_used} past records)</small>
      `;
    }
  } catch (err) {
    alert("Prediction failed. Check server logs.");
  }
}
</script>
</body>
</html>
